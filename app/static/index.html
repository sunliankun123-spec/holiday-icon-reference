<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>节日图标参考采集器</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
        background: linear-gradient(180deg, #eaf4ff 0%, #f6fbff 100%);
        margin: 0;
        padding: 28px;
      }
      .card {
        max-width: 820px;
        margin: 0 auto;
        background: #ffffff;
        border-radius: 16px;
        padding: 24px 24px 18px;
        border: 1px solid #dbeafe;
        box-shadow: 0 14px 36px rgba(59, 130, 246, 0.14);
      }
      h1 {
        margin: 0 0 10px;
        font-size: 24px;
        color: #1253a5;
      }
      p {
        color: #3f5f85;
        margin-top: 0;
      }
      .row {
        display: flex;
        gap: 10px;
        margin-top: 12px;
      }
      input {
        flex: 1;
        padding: 11px 12px;
        border: 1px solid #bfdbfe;
        border-radius: 10px;
        font-size: 15px;
        color: #1f2937;
        background: #f8fbff;
      }
      button {
        border: 0;
        border-radius: 10px;
        padding: 11px 14px;
        cursor: pointer;
        font-size: 15px;
        transition: transform 0.1s ease, opacity 0.2s ease;
      }
      button:active {
        transform: translateY(1px);
      }
      #startBtn {
        background: #2f80ed;
        color: #fff;
      }
      #downloadBtn {
        background: #0ea5e9;
        color: #fff;
      }
      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      .status {
        margin-top: 16px;
        padding: 11px 12px;
        background: #eff6ff;
        border-radius: 10px;
        color: #1e3a5f;
        min-height: 22px;
        border: 1px solid #dbeafe;
      }
      .hint {
        margin-top: 8px;
        color: #5c7698;
        font-size: 13px;
      }
      .elements {
        margin-top: 12px;
        font-size: 13px;
        color: #2e4e78;
        max-height: 180px;
        overflow: auto;
        background: #f7fbff;
        border: 1px solid #dbeafe;
        border-radius: 10px;
        padding: 8px;
      }
      .job {
        margin-top: 10px;
        font-size: 12px;
        color: #4b6b91;
      }
      .progress-wrap {
        margin-top: 12px;
      }
      .progress-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        color: #355b8a;
        font-size: 13px;
        margin-bottom: 6px;
      }
      .progress-bar {
        height: 12px;
        background: #e6f1ff;
        border-radius: 999px;
        border: 1px solid #c9e2ff;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #60a5fa 0%, #2f80ed 100%);
        transition: width 0.35s ease;
      }
      .step {
        margin-top: 8px;
        font-size: 13px;
        color: #42648f;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>节日图标参考采集器</h1>
      <p>输入节日或主题名称，自动生成 10 个典型元素，并抓取 Pinterest 图标参考导出为 Excel（测试模式：每元素 3 张）。</p>
      <div class="row">
        <input id="themeInput" placeholder="例如：圣诞节 / Christmas / 中秋节" />
        <button id="startBtn">开始生成</button>
        <button id="downloadBtn">下载 Excel</button>
      </div>
      <div class="status" id="statusBox">等待开始...</div>
      <div class="job" id="jobBox">任务 ID：未创建</div>
      <div class="progress-wrap">
        <div class="progress-head">
          <span id="progressLabel">进度</span>
          <span id="progressText">0%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="step" id="stepBox">当前步骤：等待开始</div>
      </div>
      <div class="elements" id="elementsBox">典型元素列表将在创建任务后显示。</div>
      <div class="hint">说明：测试模式为 10 元素 x 每元素 3 图。</div>
    </main>

    <script>
      const themeInput = document.getElementById("themeInput");
      const startBtn = document.getElementById("startBtn");
      const downloadBtn = document.getElementById("downloadBtn");
      const statusBox = document.getElementById("statusBox");
      const elementsBox = document.getElementById("elementsBox");
      const jobBox = document.getElementById("jobBox");
      const progressFill = document.getElementById("progressFill");
      const progressText = document.getElementById("progressText");
      const stepBox = document.getElementById("stepBox");
      let currentJobId = "";
      let timer = null;
      let latestJobStatus = "idle";
      let latestServerProgress = 0;
      let isDownloading = false;
      downloadBtn.disabled = false;

      async function createJob(theme) {
        const res = await fetch("/api/jobs", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ theme }),
        });
        if (!res.ok) throw new Error("创建任务失败");
        return res.json();
      }

      async function queryJob(jobId) {
        const res = await fetch(`/api/jobs/${jobId}`);
        if (!res.ok) throw new Error("查询任务失败");
        return res.json();
      }

      function stopPolling() {
        if (timer) {
          clearInterval(timer);
          timer = null;
        }
      }

      function setProgress(percent) {
        const p = Math.max(0, Math.min(100, Math.floor(percent)));
        progressFill.style.width = `${p}%`;
        progressText.textContent = `${p}%`;
      }

      function computeServerProgress(job) {
        if (job.status === "done") return 100;
        if (job.stage === "queued" || job.stage === "starting") return 3;
        if (job.stage === "collecting") {
          const ratio = job.total > 0 ? job.current / job.total : 0;
          return 5 + ratio * 80; // 5% - 85%
        }
        if (job.stage === "exporting") {
          return job.current >= job.total ? 95 : 88; // export phase
        }
        if (job.stage === "failed") return latestServerProgress;
        return latestServerProgress;
      }

      function stageText(job) {
        if (job.status === "failed") return "生成失败";
        if (job.status === "done") return "生成完成，等待下载";
        if (job.stage === "queued") return "任务排队中";
        if (job.stage === "starting") return "初始化任务";
        if (job.stage === "collecting") return `正在采集图片（${job.current}/${job.total}）`;
        if (job.stage === "exporting") return "正在导出 Excel";
        return "处理中";
      }

      async function downloadWithProgress(jobId) {
        isDownloading = true;
        stepBox.textContent = "当前步骤：正在下载 Excel";
        statusBox.textContent = "开始下载文件...";
        try {
          const res = await fetch(`/api/download/${jobId}`);
          if (!res.ok) throw new Error("下载失败");
          const total = Number(res.headers.get("content-length") || 0);
          const reader = res.body.getReader();
          const chunks = [];
          let received = 0;
          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            chunks.push(value);
            received += value.length;
            if (total > 0) {
              const pct = 90 + (received / total) * 10;
              setProgress(pct);
            } else {
              setProgress(Math.min(99, latestServerProgress + 1));
            }
          }
          const blob = new Blob(chunks, {
            type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet",
          });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = `${jobId}.xlsx`;
          document.body.appendChild(a);
          a.click();
          a.remove();
          URL.revokeObjectURL(url);
          setProgress(100);
          stepBox.textContent = "当前步骤：下载完成";
          statusBox.textContent = "下载完成。";
        } finally {
          isDownloading = false;
        }
      }

      downloadBtn.addEventListener("click", async () => {
        if (!currentJobId) {
          statusBox.textContent = "请先点击开始生成任务。";
          return;
        }
        if (isDownloading) {
          statusBox.textContent = "正在下载中，请稍候。";
          return;
        }
        try {
          const job = await queryJob(currentJobId);
          latestJobStatus = job.status;
          latestServerProgress = computeServerProgress(job);
          setProgress(latestServerProgress);
          stepBox.textContent = `当前步骤：${stageText(job)}`;
          if (job.status === "done") {
            await downloadWithProgress(currentJobId);
          } else if (job.status === "failed") {
            statusBox.textContent = `任务失败：${job.message}`;
          } else {
            statusBox.textContent = `任务处理中（${job.current}/${job.total}），尚不能下载。`;
          }
        } catch (e) {
          statusBox.textContent = "下载前检查任务状态失败，请重试。";
        }
      });

      startBtn.addEventListener("click", async () => {
        const theme = themeInput.value.trim();
        if (!theme) {
          statusBox.textContent = "请输入节日或主题名称。";
          return;
        }

        startBtn.disabled = true;
        latestServerProgress = 0;
        setProgress(0);
        stepBox.textContent = "当前步骤：创建任务";
        statusBox.textContent = "正在创建任务...";

        try {
          const { job_id } = await createJob(theme);
          currentJobId = job_id;
          jobBox.textContent = `任务 ID：${job_id}`;
          statusBox.textContent = `任务已创建：${job_id}`;

          stopPolling();
          timer = setInterval(async () => {
            try {
              const job = await queryJob(currentJobId);
              latestJobStatus = job.status;
              latestServerProgress = computeServerProgress(job);
              if (!isDownloading) {
                setProgress(latestServerProgress);
              }
              stepBox.textContent = `当前步骤：${stageText(job)}`;
              statusBox.textContent = `${job.message} (${job.current}/${job.total})`;
              if (Array.isArray(job.elements)) {
                elementsBox.textContent = `${job.total} 个典型元素：\n` + job.elements.join(" | ");
              }

              if (job.status === "done") {
                stopPolling();
                statusBox.textContent = "任务完成，可下载 Excel。";
                setProgress(90);
                startBtn.disabled = false;
              } else if (job.status === "failed") {
                stopPolling();
                statusBox.textContent = `任务失败：${job.message}`;
                startBtn.disabled = false;
              }
            } catch (e) {
              stopPolling();
              statusBox.textContent = "轮询任务失败，请重试。";
              startBtn.disabled = false;
            }
          }, 2200);
        } catch (e) {
          statusBox.textContent = "创建任务失败，请稍后重试。";
          startBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
